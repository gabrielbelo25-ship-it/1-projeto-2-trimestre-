<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória: Doenças Oculares</title>
    <style>
        :root {
            --bg-sky: #87CEEB; /* Azul Céu */
            --card-dark-blue: #0f172a; /* Azul Escuro */
            --card-front-bg: #ffffff;
            --text-light: #f8fafc;
            --text-dark: #1e293b;
            --success: #10b981;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-sky);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: var(--card-dark-blue);
            margin: 10px 0 5px 0;
            text-align: center;
            font-size: 2.3rem;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .score-board {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        /* Grid do Jogo: 8 cartas no total */
        .memory-game {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            perspective: 1000px;
        }

        @media (max-width: 768px) {
            .memory-game {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .memory-card {
            height: 260px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            cursor: pointer;
        }

        /* Ativa a rotação ao virar */
        .memory-card.flip {
            transform: rotateY(180deg);
        }

        /* Quando o par está correto, ganha um efeito visual verde estável */
        .memory-card.matched .front {
            border: 4px solid var(--success);
        }

        .back, .front {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 15px;
        }

        /* Lado de Trás (Escondido): Azul Escuro com o Ícone do Olho */
        .back {
            background-color: var(--card-dark-blue);
            color: var(--text-light);
            text-align: center;
        }

        .back .eye-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .back span {
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Lado da Frente (Revelado): Branco com conteúdo */
        .front {
            background-color: var(--card-front-bg);
            transform: rotateY(180deg);
            text-align: center;
        }

        /* Estilo para cartas do tipo Nome/Imagem */
        .front h2 {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: var(--card-dark-blue);
        }

        .image-container {
            width: 100%;
            height: 130px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Estilo para cartas do tipo Descrição */
        .front p {
            font-size: 0.95rem;
            line-height: 1.4;
            margin: 0;
            color: var(--text-dark);
            font-weight: 500;
        }

        .front .card-type {
            font-size: 0.75rem;
            color: #2563eb;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #win-message {
            display: none;
            background-color: var(--success);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.3rem;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

            return array.sort(() => Math.random() - 0.5);

            const shuffledCards = shuffle([...cardsData]);

                    frontContent = `
                        <div class="card-type">Doença</div>
                        <h2>${data.name}</h2>
                        <div class="image-container">

                        </div>
                    `;
                } else {
                    frontContent = `
                        <div class="card-type">Sintomas / Definição</div>
                        <p>${data.desc}</p>
                    `;
                }

                card.innerHTML = `
                    <div class="front">${frontContent}</div>
                    <div class="back">
                        <div class="eye-icon">👁️</div>
                        <span>Oftalmo</span>
                    </div>
                `;

                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });
        }

            this.classList.add('flip');

            if (!hasFlippedCard) {

                hasFlippedCard = true;
                firstCard = this;
                return;
